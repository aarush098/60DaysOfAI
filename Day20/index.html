<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Face Puzzle Game</title>
<style>
  :root{
    --bg1:#1e1b4b;
    --bg2:#4c1d95;
    --accent:#f472b6;
    --accent2:#22d3ee;
    --good:#22c55e;
    --card:#ffffff;
    --text:#1f2937;
    --muted:#6b7280;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    font-family:'Segoe UI',system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(135deg,var(--bg1),var(--bg2));
    color:#fff;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px;
  }
  h1{
    font-size:1.8rem;
    margin:10px 0 20px;
    text-align:center;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .panel{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    border-radius:16px;
    padding:20px;
    max-width:640px;
    width:100%;
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
    margin-bottom:20px;
  }
  .center{ text-align:center; }
  video, canvas#snapshotCanvas{
    width:100%;
    max-width:480px;
    border-radius:12px;
    background:#000;
    transform:scaleX(-1);
  }
  .btn{
    display:inline-block;
    padding:12px 22px;
    margin:6px;
    border:none;
    border-radius:10px;
    font-size:1rem;
    font-weight:600;
    cursor:pointer;
    background:linear-gradient(90deg,var(--accent),#ec4899);
    color:#fff;
    transition:transform .15s ease, box-shadow .15s ease;
    box-shadow:0 4px 14px rgba(236,72,153,0.4);
  }
  .btn:hover{ transform:translateY(-2px); box-shadow:0 6px 20px rgba(236,72,153,0.55); }
  .btn:active{ transform:translateY(0); }
  .btn.secondary{
    background:linear-gradient(90deg,#22d3ee,#06b6d4);
    box-shadow:0 4px 14px rgba(34,211,238,0.35);
  }
  .btn.ghost{
    background:rgba(255,255,255,0.12);
    box-shadow:none;
  }
  .btn:disabled{
    opacity:0.4;
    cursor:not-allowed;
    transform:none;
    box-shadow:none;
  }
  .diff-row{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin-top:10px;
  }
  .diff-btn{
    padding:12px 18px;
    border-radius:10px;
    border:2px solid rgba(255,255,255,0.3);
    background:rgba(255,255,255,0.08);
    color:#fff;
    cursor:pointer;
    font-weight:600;
    font-size:1rem;
    transition:all .15s ease;
  }
  .diff-btn:hover{ border-color:var(--accent2); }
  .diff-btn.selected{
    background:linear-gradient(90deg,var(--accent2),#06b6d4);
    border-color:var(--accent2);
  }
  .hud{
    display:flex;
    justify-content:space-around;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:14px;
  }
  .hud-item{
    background:rgba(255,255,255,0.1);
    padding:10px 16px;
    border-radius:10px;
    text-align:center;
    min-width:90px;
  }
  .hud-item .label{
    font-size:0.72rem;
    text-transform:uppercase;
    letter-spacing:0.05em;
    color:#d1d5db;
    display:block;
  }
  .hud-item .value{
    font-size:1.25rem;
    font-weight:700;
  }
  #puzzleWrap{
    position:relative;
    margin:0 auto;
    touch-action:none;
    user-select:none;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 8px 30px rgba(0,0,0,0.5);
  }
  .cell{
    position:absolute;
    box-sizing:border-box;
  }
  .piece{
    position:absolute;
    box-sizing:border-box;
    background-repeat:no-repeat;
    cursor:grab;
    border:2px solid rgba(255,255,255,0.25);
    transition:box-shadow .15s ease, border-color .15s ease;
    will-change:transform;
    z-index:1;
  }
  .piece.dragging{
    cursor:grabbing;
    border:3px solid var(--accent2) !important;
    box-shadow:0 0 0 3px rgba(34,211,238,0.4), 0 8px 20px rgba(0,0,0,0.5);
    z-index:50 !important;
  }
  .piece.correct{
    border:3px solid var(--good) !important;
  }
  .overlay{
    position:fixed;
    inset:0;
    background:rgba(15,10,30,0.85);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:1000;
    padding:20px;
  }
  .overlay.hidden{ display:none; }
  .result-card{
    background:var(--card);
    color:var(--text);
    border-radius:16px;
    padding:30px;
    max-width:420px;
    width:100%;
    text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
  }
  .result-card h2{
    margin-top:0;
    color:#7c3aed;
  }
  .result-stats{
    display:flex;
    justify-content:space-around;
    margin:20px 0;
  }
  .result-stats div{
    display:flex;
    flex-direction:column;
  }
  .result-stats .num{
    font-size:1.4rem;
    font-weight:700;
    color:#111827;
  }
  .result-stats .lab{
    font-size:0.75rem;
    color:var(--muted);
    text-transform:uppercase;
  }
  table.leaderboard{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
    font-size:0.85rem;
  }
  table.leaderboard th, table.leaderboard td{
    padding:6px 8px;
    text-align:left;
    border-bottom:1px solid #e5e7eb;
  }
  table.leaderboard th{
    color:var(--muted);
    font-weight:600;
    font-size:0.72rem;
    text-transform:uppercase;
  }
  .hidden{ display:none !important; }
  .error-box{
    background:rgba(239,68,68,0.15);
    border:1px solid #ef4444;
    border-radius:10px;
    padding:14px;
    margin-top:10px;
  }
  .step-title{
    font-size:1.1rem;
    font-weight:700;
    margin-bottom:10px;
    text-align:center;
  }
  footer{
    margin-top:auto;
    padding-top:10px;
    font-size:0.75rem;
    color:rgba(255,255,255,0.5);
    text-align:center;
  }
  @media (max-width:480px){
    h1{ font-size:1.4rem; }
    .hud-item{ min-width:70px; padding:8px 10px; }
    .hud-item .value{ font-size:1.05rem; }
  }
</style>
</head>
<body>

<h1>🧩 Face Puzzle Game</h1>

<!-- STEP 1: CAMERA -->
<div class="panel" id="cameraPanel">
  <div class="step-title">Step 1: Take a Photo</div>
  <div class="center">
    <video id="video" autoplay playsinline muted></video>
    <div id="cameraError" class="error-box hidden"></div>
  </div>
  <div class="center" style="margin-top:14px;">
    <button class="btn" id="takePhotoBtn" disabled>📸 Take Photo</button>
    <button class="btn secondary hidden" id="retryCameraBtn">🔄 Retry Camera</button>
  </div>
</div>

<!-- STEP 2: PREVIEW + DIFFICULTY -->
<div class="panel hidden" id="previewPanel">
  <div class="step-title">Step 2: Choose Difficulty</div>
  <div class="center">
    <canvas id="snapshotCanvas"></canvas>
  </div>
  <div class="diff-row">
    <button class="diff-btn" data-size="3">3 × 3 (Easy)</button>
    <button class="diff-btn" data-size="4">4 × 4 (Medium)</button>
    <button class="diff-btn" data-size="5">5 × 5 (Hard)</button>
  </div>
  <div class="center" style="margin-top:16px;">
    <button class="btn" id="startPuzzleBtn" disabled>▶️ Start Puzzle</button>
    <button class="btn ghost" id="retakeBtn">🔁 Retake Photo</button>
  </div>
</div>

<!-- STEP 3: PUZZLE -->
<div class="panel hidden" id="gamePanel">
  <div class="hud">
    <div class="hud-item"><span class="label">Time</span><span class="value" id="timeDisplay">00:00.0</span></div>
    <div class="hud-item"><span class="label">Moves</span><span class="value" id="movesDisplay">0</span></div>
    <div class="hud-item"><span class="label">Placed</span><span class="value" id="placedDisplay">0/0</span></div>
    <div class="hud-item"><span class="label">Grid</span><span class="value" id="gridDisplay">-</span></div>
  </div>
  <div class="center">
    <div id="puzzleWrap"></div>
  </div>
  <div class="center" style="margin-top:16px;">
    <button class="btn ghost" id="newPhotoBtn">📷 New Photo</button>
    <button class="btn secondary" id="shuffleAgainBtn">🔀 Reshuffle</button>
  </div>
</div>

<!-- WIN OVERLAY -->
<div class="overlay hidden" id="winOverlay">
  <div class="result-card">
    <h2>🎉 Puzzle Solved!</h2>
    <div class="result-stats">
      <div><span class="num" id="finalTime">00:00.0</span><span class="lab">Time</span></div>
      <div><span class="num" id="finalMoves">0</span><span class="lab">Moves</span></div>
      <div><span class="num" id="finalDiff">-</span><span class="lab">Grid</span></div>
    </div>
    <div id="leaderboardWrap">
      <strong>🏆 Best Times</strong>
      <table class="leaderboard" id="leaderboardTable">
        <thead><tr><th>#</th><th>Time</th><th>Moves</th><th>Grid</th><th>Date</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
    <div style="margin-top:20px;">
      <button class="btn" id="playAgainBtn">🔁 Play Again</button>
      <button class="btn secondary" id="newPhotoFromWinBtn">📷 New Photo</button>
    </div>
  </div>
</div>

<footer>Works fully offline. Your photo never leaves your device.</footer>

<script>
(function(){
  'use strict';

  // ---------- STATE ----------
  let stream = null;
  let faceImage = null;      // HTMLImageElement of captured face
  let gridSize = 0;          // 3,4,5
  let pieceOrder = [];       // pieceOrder[cellIndex] = pieceId currently occupying that cell
  let pieceCellOf = [];      // pieceCellOf[pieceId] = cellIndex it currently occupies
  let totalPieces = 0;
  let moves = 0;
  let timerStart = 0;
  let timerInterval = null;
  let elapsedMs = 0;
  let isWon = false;
  let puzzleSize = 0; // pixel size of the square puzzle
  let cellSize = 0;

  // drag state
  let dragPieceId = null;
  let dragEl = null;
  let dragOffsetX = 0, dragOffsetY = 0;
  let dragStartX = 0, dragStartY = 0;

  const video = document.getElementById('video');
  const cameraPanel = document.getElementById('cameraPanel');
  const previewPanel = document.getElementById('previewPanel');
  const gamePanel = document.getElementById('gamePanel');
  const takePhotoBtn = document.getElementById('takePhotoBtn');
  const retryCameraBtn = document.getElementById('retryCameraBtn');
  const cameraError = document.getElementById('cameraError');
  const snapshotCanvas = document.getElementById('snapshotCanvas');
  const startPuzzleBtn = document.getElementById('startPuzzleBtn');
  const retakeBtn = document.getElementById('retakeBtn');
  const diffButtons = document.querySelectorAll('.diff-btn');
  const puzzleWrap = document.getElementById('puzzleWrap');
  const timeDisplay = document.getElementById('timeDisplay');
  const movesDisplay = document.getElementById('movesDisplay');
  const placedDisplay = document.getElementById('placedDisplay');
  const gridDisplay = document.getElementById('gridDisplay');
  const newPhotoBtn = document.getElementById('newPhotoBtn');
  const shuffleAgainBtn = document.getElementById('shuffleAgainBtn');
  const winOverlay = document.getElementById('winOverlay');
  const finalTime = document.getElementById('finalTime');
  const finalMoves = document.getElementById('finalMoves');
  const finalDiff = document.getElementById('finalDiff');
  const playAgainBtn = document.getElementById('playAgainBtn');
  const newPhotoFromWinBtn = document.getElementById('newPhotoFromWinBtn');
  const leaderboardTable = document.getElementById('leaderboardTable').querySelector('tbody');

  // ---------- CAMERA ----------
  async function startCamera(){
    cameraError.classList.add('hidden');
    takePhotoBtn.disabled = true;
    retryCameraBtn.classList.add('hidden');
    try{
      if(stream){
        stream.getTracks().forEach(t=>t.stop());
      }
      stream = await navigator.mediaDevices.getUserMedia({
        video:{ facingMode:'user', width:{ideal:640}, height:{ideal:480} },
        audio:false
      });
      video.srcObject = stream;
      await video.play();
      takePhotoBtn.disabled = false;
    }catch(err){
      let msg = 'Could not access your camera. ';
      if(err && err.name === 'NotAllowedError'){
        msg += 'Camera permission was denied. Please allow camera access in your browser settings and retry.';
      } else if(err && err.name === 'NotFoundError'){
        msg += 'No camera device was found on this system.';
      } else if(location.protocol !== 'https:' && location.hostname !== 'localhost'){
        msg += 'Camera access requires HTTPS (or localhost).';
      } else {
        msg += 'Error: ' + (err && err.message ? err.message : String(err));
      }
      cameraError.textContent = msg;
      cameraError.classList.remove('hidden');
      retryCameraBtn.classList.remove('hidden');
      takePhotoBtn.disabled = true;
    }
  }

  retryCameraBtn.addEventListener('click', startCamera);

  takePhotoBtn.addEventListener('click', ()=>{
    const w = video.videoWidth || 480;
    const h = video.videoHeight || 480;
    const side = Math.min(w,h);
    const sx = (w-side)/2;
    const sy = (h-side)/2;

    const tmp = document.createElement('canvas');
    tmp.width = 480; tmp.height = 480;
    const ctx = tmp.getContext('2d');
    // mirror the capture so it matches the (mirrored) preview the user sees
    ctx.save();
    ctx.translate(480,0);
    ctx.scale(-1,1);
    ctx.drawImage(video, sx, sy, side, side, 0, 0, 480, 480);
    ctx.restore();

    snapshotCanvas.width = 480;
    snapshotCanvas.height = 480;
    const sctx = snapshotCanvas.getContext('2d');
    sctx.save();
    sctx.translate(480,0);
    sctx.scale(-1,1);
    sctx.drawImage(tmp, 0, 0);
    sctx.restore();
    // Note: snapshotCanvas has CSS transform:scaleX(-1) applied globally to video/canvas elements
    // so we un-mirror the drawn bitmap here to display correctly on screen.

    faceImage = new Image();
    faceImage.onload = ()=>{
      cameraPanel.classList.add('hidden');
      previewPanel.classList.remove('hidden');
    };
    faceImage.src = tmp.toDataURL('image/png');
  });

  // ---------- DIFFICULTY SELECTION ----------
  diffButtons.forEach(btn=>{
    btn.addEventListener('click', ()=>{
      diffButtons.forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      gridSize = parseInt(btn.dataset.size, 10);
      startPuzzleBtn.disabled = false;
    });
  });

  retakeBtn.addEventListener('click', ()=>{
    previewPanel.classList.add('hidden');
    cameraPanel.classList.remove('hidden');
    diffButtons.forEach(b=>b.classList.remove('selected'));
    startPuzzleBtn.disabled = true;
    gridSize = 0;
    startCamera();
  });

  newPhotoBtn.addEventListener('click', resetToCamera);
  newPhotoFromWinBtn.addEventListener('click', ()=>{
    winOverlay.classList.add('hidden');
    resetToCamera();
  });

  function resetToCamera(){
    stopTimer();
    gamePanel.classList.add('hidden');
    winOverlay.classList.add('hidden');
    previewPanel.classList.add('hidden');
    cameraPanel.classList.remove('hidden');
    diffButtons.forEach(b=>b.classList.remove('selected'));
    startPuzzleBtn.disabled = true;
    gridSize = 0;
    startCamera();
  }

  startPuzzleBtn.addEventListener('click', ()=>{
    previewPanel.classList.add('hidden');
    gamePanel.classList.remove('hidden');
    buildPuzzle();
  });

  shuffleAgainBtn.addEventListener('click', ()=>{
    buildPuzzle();
  });

  playAgainBtn.addEventListener('click', ()=>{
    winOverlay.classList.add('hidden');
    buildPuzzle();
  });

  // ---------- PUZZLE BUILD ----------
  function computePuzzlePixelSize(){
    const maxWidth = Math.min(window.innerWidth - 60, 480);
    return Math.max(240, maxWidth);
  }

  function buildPuzzle(){
    isWon = false;
    moves = 0;
    elapsedMs = 0;
    movesDisplay.textContent = '0';
    timeDisplay.textContent = '00:00.0';
    gridDisplay.textContent = gridSize + '×' + gridSize;

    totalPieces = gridSize * gridSize;
    puzzleSize = computePuzzlePixelSize();
    cellSize = puzzleSize / gridSize;

    puzzleWrap.style.width = puzzleSize + 'px';
    puzzleWrap.style.height = puzzleSize + 'px';
    puzzleWrap.innerHTML = '';

    // cell backgrounds (grid lines) for visual grid reference
    for(let i=0;i<totalPieces;i++){
      const r = Math.floor(i/gridSize), c = i % gridSize;
      const cellDiv = document.createElement('div');
      cellDiv.className = 'cell';
      cellDiv.style.left = (c*cellSize)+'px';
      cellDiv.style.top = (r*cellSize)+'px';
      cellDiv.style.width = cellSize+'px';
      cellDiv.style.height = cellSize+'px';
      cellDiv.style.border = '1px dashed rgba(255,255,255,0.15)';
      puzzleWrap.appendChild(cellDiv);
    }

    // create solvable scrambled permutation (any permutation is solvable for our free-swap sliding-free puzzle
    // since we allow swapping any two tiles, not just moving into an empty slot).
    let order = [];
    for(let i=0;i<totalPieces;i++) order.push(i);
    do {
      shuffleArray(order);
    } while(isIdentity(order) && totalPieces>1);

    pieceOrder = order.slice(); // pieceOrder[cell] = pieceId
    pieceCellOf = new Array(totalPieces);
    for(let cell=0; cell<totalPieces; cell++){
      pieceCellOf[pieceOrder[cell]] = cell;
    }

    // create piece elements; pieceId's home cell = pieceId itself (correct position)
    for(let pid=0; pid<totalPieces; pid++){
      const el = document.createElement('div');
      el.className = 'piece';
      el.dataset.pieceId = String(pid);
      const homeRow = Math.floor(pid/gridSize), homeCol = pid % gridSize;
      el.style.width = cellSize+'px';
      el.style.height = cellSize+'px';
      el.style.backgroundImage = 'url(' + faceImage.src + ')';
      el.style.backgroundSize = puzzleSize + 'px ' + puzzleSize + 'px';
      el.style.backgroundPosition = (-homeCol*cellSize) + 'px ' + (-homeRow*cellSize) + 'px';

      const currentCell = pieceCellOf[pid];
      positionPieceAtCell(el, currentCell);

      el.addEventListener('mousedown', onDragStart);
      el.addEventListener('touchstart', onDragStart, {passive:false});

      puzzleWrap.appendChild(el);
    }

    updatePlacedCount();
    startTimer();
  }

  function isIdentity(arr){
    for(let i=0;i<arr.length;i++) if(arr[i]!==i) return false;
    return true;
  }

  function shuffleArray(arr){
    for(let i=arr.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [arr[i],arr[j]] = [arr[j],arr[i]];
    }
  }

  function positionPieceAtCell(el, cellIndex){
    const r = Math.floor(cellIndex/gridSize), c = cellIndex % gridSize;
    el.style.left = (c*cellSize)+'px';
    el.style.top = (r*cellSize)+'px';
  }

  function refreshCorrectHighlights(){
    const pieces = puzzleWrap.querySelectorAll('.piece');
    pieces.forEach(el=>{
      const pid = parseInt(el.dataset.pieceId,10);
      if(pieceCellOf[pid] === pid){
        el.classList.add('correct');
      } else {
        el.classList.remove('correct');
      }
    });
  }

  function updatePlacedCount(){
    let placed = 0;
    for(let pid=0; pid<totalPieces; pid++){
      if(pieceCellOf[pid] === pid) placed++;
    }
    placedDisplay.textContent = placed + '/' + totalPieces;
    refreshCorrectHighlights();
    if(placed === totalPieces && totalPieces>0){
      handleWin();
    }
  }

  // ---------- DRAG & TOUCH ----------
  function getPointFromEvent(e){
    if(e.touches && e.touches.length>0){
      return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }
    if(e.changedTouches && e.changedTouches.length>0){
      return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
    }
    return { x: e.clientX, y: e.clientY };
  }

  function onDragStart(e){
    if(isWon) return;
    e.preventDefault();
    const el = e.currentTarget;
    dragEl = el;
    dragPieceId = parseInt(el.dataset.pieceId,10);
    el.classList.add('dragging');

    const rect = puzzleWrap.getBoundingClientRect();
    const pt = getPointFromEvent(e);
    const elLeft = parseFloat(el.style.left);
    const elTop = parseFloat(el.style.top);
    dragOffsetX = (pt.x - rect.left) - elLeft;
    dragOffsetY = (pt.y - rect.top) - elTop;
    dragStartX = elLeft;
    dragStartY = elTop;

    document.addEventListener('mousemove', onDragMove);
    document.addEventListener('mouseup', onDragEnd);
    document.addEventListener('touchmove', onDragMove, {passive:false});
    document.addEventListener('touchend', onDragEnd);
  }

  function onDragMove(e){
    if(!dragEl) return;
    e.preventDefault();
    const rect = puzzleWrap.getBoundingClientRect();
    const pt = getPointFromEvent(e);
    let x = (pt.x - rect.left) - dragOffsetX;
    let y = (pt.y - rect.top) - dragOffsetY;
    const maxPos = puzzleSize - cellSize;
    x = Math.max(-cellSize*0.4, Math.min(maxPos + cellSize*0.4, x));
    y = Math.max(-cellSize*0.4, Math.min(maxPos + cellSize*0.4, y));
    dragEl.style.left = x + 'px';
    dragEl.style.top = y + 'px';
  }

  function onDragEnd(e){
    if(!dragEl) return;
    e.preventDefault && e.preventDefault();
    document.removeEventListener('mousemove', onDragMove);
    document.removeEventListener('mouseup', onDragEnd);
    document.removeEventListener('touchmove', onDragMove);
    document.removeEventListener('touchend', onDragEnd);

    const curLeft = parseFloat(dragEl.style.left);
    const curTop = parseFloat(dragEl.style.top);
    let col = Math.round(curLeft / cellSize);
    let row = Math.round(curTop / cellSize);
    col = Math.max(0, Math.min(gridSize-1, col));
    row = Math.max(0, Math.min(gridSize-1, row));
    const targetCell = row*gridSize + col;

    const sourceCell = pieceCellOf[dragPieceId];

    if(targetCell !== sourceCell){
      const otherPieceId = pieceOrder[targetCell];
      // swap
      pieceOrder[sourceCell] = otherPieceId;
      pieceOrder[targetCell] = dragPieceId;
      pieceCellOf[dragPieceId] = targetCell;
      pieceCellOf[otherPieceId] = sourceCell;

      // move the other piece element to sourceCell visually
      const otherEl = puzzleWrap.querySelector('.piece[data-piece-id="'+otherPieceId+'"]');
      if(otherEl){
        positionPieceAtCell(otherEl, sourceCell);
      }
      moves++;
      movesDisplay.textContent = String(moves);
    }

    positionPieceAtCell(dragEl, targetCell);
    dragEl.classList.remove('dragging');
    dragEl = null;
    dragPieceId = null;

    updatePlacedCount();
  }

  // ---------- TIMER ----------
  function startTimer(){
    stopTimer();
    timerStart = performance.now();
    timerInterval = setInterval(()=>{
      elapsedMs = performance.now() - timerStart;
      timeDisplay.textContent = formatTime(elapsedMs);
    }, 100);
  }

  function stopTimer(){
    if(timerInterval){
      clearInterval(timerInterval);
      timerInterval = null;
    }
  }

  function formatTime(ms){
    const totalTenths = Math.floor(ms/100);
    const tenths = totalTenths % 10;
    const totalSeconds = Math.floor(ms/1000);
    const seconds = totalSeconds % 60;
    const minutes = Math.floor(totalSeconds/60);
    return pad(minutes)+':'+pad(seconds)+'.'+tenths;
  }
  function pad(n){ return n<10 ? '0'+n : String(n); }

  // ---------- WIN ----------
  function handleWin(){
    if(isWon) return;
    isWon = true;
    stopTimer();
    const finalMs = elapsedMs;
    finalTime.textContent = formatTime(finalMs);
    finalMoves.textContent = String(moves);
    finalDiff.textContent = gridSize+'×'+gridSize;

    saveScore(finalMs, moves, gridSize);
    renderLeaderboard();

    winOverlay.classList.remove('hidden');
  }

  function saveScore(ms, movesCount, size){
    const key = 'facePuzzleBestTimes';
    let list = [];
    try{
      list = JSON.parse(localStorage.getItem(key)) || [];
    }catch(e){ list = []; }
    list.push({
      ms: ms,
      moves: movesCount,
      size: size,
      date: new Date().toLocaleDateString()
    });
    list.sort((a,b)=>a.ms-b.ms);
    list = list.slice(0,5);
    try{
      localStorage.setItem(key, JSON.stringify(list));
    }catch(e){ /* storage unavailable, ignore */ }
  }

  function renderLeaderboard(){
    const key = 'facePuzzleBestTimes';
    let list = [];
    try{
      list = JSON.parse(localStorage.getItem(key)) || [];
    }catch(e){ list = []; }
    leaderboardTable.innerHTML = '';
    if(list.length === 0){
      const tr = document.createElement('tr');
      tr.innerHTML = '<td colspan="5" style="text-align:center;color:#9ca3af;">No scores yet</td>';
      leaderboardTable.appendChild(tr);
      return;
    }
    list.forEach((entry, idx)=>{
      const tr = document.createElement('tr');
      tr.innerHTML =
        '<td>'+(idx+1)+'</td>'+
        '<td>'+formatTime(entry.ms)+'</td>'+
        '<td>'+entry.moves+'</td>'+
        '<td>'+entry.size+'×'+entry.size+'</td>'+
        '<td>'+entry.date+'</td>';
      leaderboardTable.appendChild(tr);
    });
  }

  window.addEventListener('resize', ()=>{
    if(!gamePanel.classList.contains('hidden') && gridSize>0 && !isWon){
      // Rebuild layout sizes without rescrambling
      const oldOrder = pieceOrder.slice();
      puzzleSize = computePuzzlePixelSize();
      cellSize = puzzleSize / gridSize;
      puzzleWrap.style.width = puzzleSize+'px';
      puzzleWrap.style.height = puzzleSize+'px';
      const cells = puzzleWrap.querySelectorAll('.cell');
      cells.forEach((cellDiv, i)=>{
        const r = Math.floor(i/gridSize), c = i%gridSize;
        cellDiv.style.left=(c*cellSize)+'px';
        cellDiv.style.top=(r*cellSize)+'px';
        cellDiv.style.width=cellSize+'px';
        cellDiv.style.height=cellSize+'px';
      });
      const pieces = puzzleWrap.querySelectorAll('.piece');
      pieces.forEach(el=>{
        const pid = parseInt(el.dataset.pieceId,10);
        const homeRow = Math.floor(pid/gridSize), homeCol = pid%gridSize;
        el.style.width = cellSize+'px';
        el.style.height = cellSize+'px';
        el.style.backgroundSize = puzzleSize+'px '+puzzleSize+'px';
        el.style.backgroundPosition = (-homeCol*cellSize)+'px '+(-homeRow*cellSize)+'px';
        positionPieceAtCell(el, pieceCellOf[pid]);
      });
    }
  });

  // init
  startCamera();
  renderLeaderboard();
})();
</script>
</body>
</html>
